services:
  - type: web
    name: astrology-backend
    runtime: node
    repo: https://github.com/rai8053/Astrology
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.cjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: astrology-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: astrology-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: astrology-frontend
          property: url
      - key: FRONTEND_URL
        fromService:
          type: web
          name: astrology-frontend
          property: url

  - type: web
    name: astrology-frontend
    runtime: static
    repo: https://github.com/rai8053/Astrology
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: astrology-backend
          property: url

databases:
  - name: astrology-db
    plan: starter
    databaseName: soma_surya
    ipAllowList: []

redis:
  - name: astrology-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
