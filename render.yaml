services:
  - type: web
    name: astrology-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.cjs
    preDeployCommand: npx prisma generate
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: astrology-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: astrology-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: astrology-frontend
          property: url
      - key: CROSS_ORIGIN_DEPLOY
        value: "true"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: astrology-frontend
          property: url
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://api.hcnsec.cn/v1
      - key: OPENROUTER_MODEL
        value: DeepSeek-V4-Flash
      - key: OPENROUTER_FALLBACK_MODELS
        value: DeepSeek-V4-Pro,glm-5.2,step-3.7-flash
      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: EMBEDDING_MODEL
        value: openai/text-embedding-3-small
      - key: EMBEDDING_DIMENSIONS
        value: "1536"

  - type: web
    name: astrology-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: astrology-backend
          property: url

  - type: redis
    name: astrology-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: astrology-db
    plan: basic-256mb
    databaseName: soma_surya
    ipAllowList: []
