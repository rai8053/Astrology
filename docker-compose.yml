version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: soma_surya
      POSTGRES_PASSWORD: soma_surya_secret
      POSTGRES_DB: soma_surya
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://soma_surya:soma_surya_secret@db:5432/soma_surya?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 4000
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  pgdata:
