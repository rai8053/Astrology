services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: soma_surya
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soma_surya_secret}
      POSTGRES_DB: soma_surya
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U soma_surya']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DATABASE_URL: postgresql://soma_surya:${POSTGRES_PASSWORD:-soma_surya_secret}@db:5432/soma_surya?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MOCK_AI: ${MOCK_AI:-false}
      DEMO_MODE: ${DEMO_MODE:-false}
      SKIP_PAYMENT: ${SKIP_PAYMENT:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:4000}
      APP_URL: ${APP_URL:-http://localhost:4000}
    ports:
      - '4000:4000'

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: always
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  pgdata:
