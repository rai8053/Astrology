name: CI

env:
  NODE_VERSION: 22

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Backend
        uses: ./.github/actions/setup
        with:
          working-directory: backend
          node-version: '22'

      - name: Setup Frontend
        uses: ./.github/actions/setup
        with:
          working-directory: frontend
          node-version: '22'

      - name: Lint Backend
        working-directory: backend
        run: npx tsc --noEmit

      - name: Lint Frontend
        working-directory: frontend
        run: npx tsc --noEmit

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Backend
        uses: ./.github/actions/setup
        with:
          working-directory: backend
          node-version: '22'

      - name: Setup Frontend
        uses: ./.github/actions/setup
        with:
          working-directory: frontend
          node-version: '22'

      - name: Audit Backend
        working-directory: backend
        run: npm audit --audit-level=high || true

      - name: Audit Frontend
        working-directory: frontend
        run: npm audit --audit-level=high || true

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [lint, dependency-audit]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup
        with:
          working-directory: backend
          node-version: '22'

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test?schema=public
        run: npx vitest run --reporter=github-actions

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: [lint, dependency-audit]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup
        with:
          working-directory: frontend
          node-version: '22'

      - name: Run tests
        working-directory: frontend
        run: npx vitest run --reporter=github-actions

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Backend
        uses: ./.github/actions/setup
        with:
          working-directory: backend
          node-version: '22'

      - name: Setup Frontend
        uses: ./.github/actions/setup
        with:
          working-directory: frontend
          node-version: '22'

      - name: Build Backend
        working-directory: backend
        run: npm run build

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3
          if-no-files-found: error

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 3
          if-no-files-found: error

  result:
    name: CI Result
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Check status
        run: |
          if [ '${{ needs.build.result }}' = 'success' ]; then
            echo "✅ All CI checks passed"
          else
            echo "❌ CI checks failed"
            exit 1
          fi
