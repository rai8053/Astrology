name: Deploy to Cloudflare Pages

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check Cloudflare secrets
        id: check-secrets
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Frontend
        if: steps.check-secrets.outputs.has_secrets == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'astrology-frontend' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deployment Summary
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: |
          echo "## Cloudflare Pages Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment URL: ${{ steps.deploy.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
          ${{ steps.deploy.outputs.pages-deployment-alias-url && format('echo \"- Alias URL: {0}\" >> $GITHUB_STEP_SUMMARY', steps.deploy.outputs.pages-deployment-alias-url) || '' }}

      - name: Skip notice
        if: steps.check-secrets.outputs.has_secrets == 'false'
        run: |
          echo "### Cloudflare Pages deploy skipped" >> $GITHUB_STEP_SUMMARY
          echo "Set \`CLOUDFLARE_API_TOKEN\` and \`CLOUDFLARE_ACCOUNT_ID\` secrets to enable auto-deploy." >> $GITHUB_STEP_SUMMARY
          echo "Optionally set \`CLOUDFLARE_PROJECT_NAME\` variable (default: 'astrology-frontend')." >> $GITHUB_STEP_SUMMARY
